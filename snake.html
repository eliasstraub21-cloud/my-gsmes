<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 10px;
        }
        #score {
            font-size: 24px;
            margin-bottom: 20px;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .controls {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>SNAKE</h1>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">Use Arrow Keys or WASD to move</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let gameSpeed = 100; // milliseconds per frame

        function main() {
            if (hasGameEnded()) {
                alert("Game Over! Your score: " + score);
                resetGame();
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // Start the game loop
        resetGame();

        function clearCanvas() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "#00FF00"; // Snake color
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // Check if snake ate the food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById("score").innerText = "Score: " + score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function drawFood() {
            ctx.fillStyle = "#FF0000"; // Food color
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // Ensure food doesn't spawn on top of the snake
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        function hasGameEnded() {
            // Wall collisions
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }
            // Self collisions
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    return true;
                }
            }
            return false;
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            food = { x: 5, y: 5 };
            dx = 1;
            dy = 0;
            score = 0;
            document.getElementById("score").innerText = "Score: " + score;
            clearInterval(gameInterval);
            gameInterval = setInterval(main, gameSpeed);
        }

        // Handle Keyboard Controls
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const keyPressed = event.key;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === "ArrowLeft" || keyPressed === "a") && !goingRight) {
                dx = -1; dy = 0;
            }
            if ((keyPressed === "ArrowUp" || keyPressed === "w") && !goingDown) {
                dx = 0; dy = -1;
            }
            if ((keyPressed === "ArrowRight" || keyPressed === "d") && !goingLeft) {
                dx = 1; dy = 0;
            }
            if ((keyPressed === "ArrowDown" || keyPressed === "s") && !goingUp) {
                dx = 0; dy = 1;
            }
        }
    </script>
</body>
</html>
